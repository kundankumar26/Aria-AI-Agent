name: Build and Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/aria-ai-agent:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/aria-ai-agent:${{ github.sha }} .

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/aria-ai-agent:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/aria-ai-agent:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/aria-ai-agent:latest

            # Stop and remove old container
            docker stop aria-agent || true
            docker rm aria-agent || true

            # Run new container
            docker run -d \
              --name aria-agent \
              -p 3000:3000 \
              --env-file /home/ubuntu/Aria-AI-Agent/.env \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/aria-ai-agent:latest

            # Clean up old images
            docker image prune -f